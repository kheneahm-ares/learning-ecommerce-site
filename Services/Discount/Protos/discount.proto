syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "Discount.Protos";

package discount;

service DiscountProtoService {
    rpc GetDiscount (GetDiscountRequest) returns (CouponModel);
    rpc CreateDiscount (CreateDiscountRequest) returns (google.protobuf.Empty);
    rpc UpdateDiscount (UpdateDiscountRequest) returns (google.protobuf.Empty);
    rpc DeleteDiscount (DeleteDiscountRequest) returns (google.protobuf.Empty);
}

message GetDiscountRequest {
    string product_name = 1;
}

message CouponModel {
    int32 id = 1;
    string product_name = 2;
    string description = 3;
    int32 amount = 4;
}

message CreateDiscountRequest {
    string product_name = 1;
    string description = 2;
    int32 amount = 3;
}

message UpdateDiscountRequest {
    int32 id = 1;
    string product_name = 2;
    string description = 3;
    int32 amount = 4;
}

message DeleteDiscountRequest {
    string product_name = 1;
}
